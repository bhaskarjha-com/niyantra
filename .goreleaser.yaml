# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: niyantra

before:
  hooks:
    - go mod tidy
    - go vet ./...
    - go test ./internal/readiness/ ./internal/advisor/

builds:
  - id: niyantra
    main: ./cmd/niyantra
    binary: niyantra
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

release:
  github:
    owner: bhaskarjha-com
    name: niyantra
  prerelease: auto
  name_template: "v{{.Version}}"
